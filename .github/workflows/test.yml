name: self-tests
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: probe self-test
        run: python3 router/codex_quota_probe.py --self-test
      - name: statusline self-test
        run: python3 router/statusline.py --self-test
      - name: hibernate hook self-test
        run: python3 router/hibernate_hook.py --self-test
      - name: hibernate watchdog self-test
        run: python3 router/hibernate_watchdog.py --self-test
      - name: hook smoke test
        run: |
          echo '{"tool_name":"Agent"}' | python3 router/pretooluse_hook.py \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['hookSpecificOutput']['hookEventName']=='PreToolUse'"
